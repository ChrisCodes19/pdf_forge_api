# Fly.io config. Deploy with:  fly launch --no-deploy  (then edit)  ->  fly deploy
# Set the RapidAPI proxy secret with:  fly secrets set PROXY_SECRET=your-secret
app = "pdf-forge-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"    # scale to zero when idle (free-tier friendly)
  auto_start_machines = true     # cold-start on the next request
  min_machines_running = 0

[[vm]]
  # Chromium needs headroom; 512MB is the practical floor, 1GB is safer.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
